<!--
  Prepared for Supabase Auth's "Magic Link" email template, to be pushed via
  the Management API once custom SMTP (Resend) is verified and configured —
  see conversation notes, 2026-07-22. Supabase's free tier blocks all custom
  template edits (styled or bare) on the default mailer; this is why it's
  sitting here as reference instead of already live.

  Includes both the {{ .Token }} code and {{ .ConfirmationURL }} link so it
  works for both the active magic-link flow and the dormant inline-code flow
  in PaywallModal whenever that gets reactivated.
-->
<div style="background-color:#F5F2EB;padding:40px 20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <div style="max-width:420px;margin:0 auto;background-color:#FFFFFF;border-radius:16px;padding:40px 32px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
    <p style="font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:20px;color:#1C1C1A;margin:0 0 28px;text-align:center;">Bearing</p>
    <h2 style="font-family:Georgia,'Times New Roman',serif;font-weight:500;font-size:22px;color:#1C1C1A;margin:0 0 12px;text-align:center;">Your sign-in code</h2>
    <p style="font-size:14px;line-height:1.6;color:#56534D;margin:0 0 28px;text-align:center;">Enter this code where you left off. It expires shortly and works only once.</p>
    <div style="background-color:#F5F2EB;border-radius:10px;padding:18px;text-align:center;margin:0 0 28px;">
      <span style="font-family:Georgia,'Times New Roman',serif;font-size:32px;font-weight:600;letter-spacing:0.3em;color:#1C1C1A;">{{ .Token }}</span>
    </div>
    <p style="font-size:13px;color:#8C8A83;text-align:center;margin:0 0 16px;">Prefer a link instead?</p>
    <p style="text-align:center;margin:0;">
      <a href="{{ .ConfirmationURL }}" style="display:inline-block;background-color:#1C1C1A;color:#F5F2EB;text-decoration:none;font-size:14px;font-weight:500;padding:12px 24px;border-radius:8px;">Sign in with one click</a>
    </p>
  </div>
  <p style="text-align:center;font-size:12px;color:#8C8A83;margin:24px 0 0;">If you didn't request this, you can safely ignore this email.</p>
</div>
